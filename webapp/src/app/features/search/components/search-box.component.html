<div class="search-box-container">
  <div class="search-input-wrapper" [class.has-chip]="selectedNovel">
    @if (selectedNovel) {
      <span class="novel-chip">
        {{ selectedNovel }}
        <button
          type="button"
          class="chip-clear"
          (click)="novelClear.emit(); $event.stopPropagation()"
          aria-label="清除小說篩選"
        >✕</button>
      </span>
    }
    <input
      #searchInput
      type="text"
      class="search-input"
      [value]="searchKeyword"
      (input)="onSearchInput($event)"
      (keydown)="onKeyDown($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      [placeholder]="selectedNovel ? '搜尋地點、事件、人物...' : '選擇小說或輸入關鍵字...'"
      aria-label="搜尋或選擇小說"
      autocomplete="off"
    />
    @if (searchKeyword) {
      <button
        type="button"
        class="clear-button"
        (click)="clearSearch()"
        aria-label="清除搜尋"
        title="清除搜尋"
      >
        ✕
      </button>
    }
    @if (isSearching) {
      <span class="search-loading" aria-live="polite" aria-atomic="true">
        搜尋中...
      </span>
    }
  </div>
</div>
