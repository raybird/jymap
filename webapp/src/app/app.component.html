<mat-sidenav-container class="app-sidenav-container">
  <!-- 主內容 -->
  <mat-sidenav-content>

    <div class="app-viewport">
      <div class="map-layer">
        <app-map-container [center]="[35.0, 105.0]" [zoom]="5.5"
          [selectedNovel]="(selectedNovel$ | async) || null" (eventClick)="onMapEventClick($event)">
        </app-map-container>
      </div>

      <div class="ui-layer">
        <div class="top-overlay">
          <div class="top-bar">
            <app-search-box
              [selectedNovel]="(selectedNovel$ | async) ?? null"
              (searchResultsChange)="onSearchResultsChange($event)"
              (searchKeywordChange)="onSearchKeywordChange($event)"
              (focusChange)="onSearchFocusChange($event)"
              (novelClear)="onNovelSelect(null)">
            </app-search-box>
          </div>

          <!-- Autocomplete 下拉覆蓋層 -->
          @if (isSearchFocused) {
            <div class="search-results-overlay">
              <!-- 有輸入關鍵字：顯示搜尋結果 -->
              @if (searchKeyword && searchKeyword.trim().length > 0) {
                <app-search-results [results]="searchResults" [maxResults]="10" [showTopResults]="true"
                  (resultClick)="onSearchResultClick($event)">
                </app-search-results>
              }
              <!-- 無關鍵字：顯示小說選擇列表 -->
              @else {
                <div class="novel-dropdown">
                  <div class="novel-dropdown-header">選擇小說篩選</div>
                  <button
                    class="novel-option"
                    [class.active]="(selectedNovel$ | async) === null"
                    (click)="onNovelSelect(null)">
                    <span class="novel-icon">📚</span>
                    <span>所有小說（顯示全部）</span>
                  </button>
                  @for (novel of novels; track novel) {
                    <button
                      class="novel-option"
                      [class.active]="(selectedNovel$ | async) === novel"
                      (click)="onNovelSelect(novel)">
                      <span class="novel-icon">📖</span>
                      <span>{{ novel }}</span>
                    </button>
                  }
                </div>
              }
            </div>
          }
        </div>

        <div class="bottom-overlay">
          <app-timeline-container [timelineItems]="(timeline$ | async) || []" [events]="(events$ | async) || []"
            (timeRangeChange)="onTimeRangeChange($event)" (eventDotClick)="onEventDotClick($event)">
          </app-timeline-container>
        </div>
      </div>

      @if (loading$ | async) {
      <div class="loading-overlay">
        <div class="loader"></div>
        <p>載入金庸世界中...</p>
      </div>
      }

      @if (error$ | async; as error) {
      <div class="error-overlay">
        <p>{{ error }}</p>
        <button (click)="loadData()">重試</button>
      </div>
      }
    </div>

  </mat-sidenav-content>

  <!-- 右側抽屜：事件卡片 -->
  <mat-sidenav class="event-card-sidenav" #eventSidenav position="end"
    [opened]="(selectedEvent$ | async) !== null" mode="over"
    (closed)="onCloseEventCard()">
    <app-event-card [event]="selectedEvent$ | async" (close)="onCloseEventCard()"
      (navigateToEvent)="onNavigateToEvent($event)">
    </app-event-card>
  </mat-sidenav>
</mat-sidenav-container>
