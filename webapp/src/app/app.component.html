<mat-sidenav-container class="app-sidenav-container">
  <!-- 主內容 -->
  <mat-sidenav-content>

    <div class="app-viewport">
      <div class="map-layer">
        <app-map-container [center]="[35.0, 105.0]" [zoom]="5.5"
          [selectedNovel]="(selectedNovel$ | async) || null" (eventClick)="onMapEventClick($event)">
        </app-map-container>
      </div>

      <div class="ui-layer">
        <div class="top-overlay">
          <div class="top-bar">
            <app-search-box (searchResultsChange)="onSearchResultsChange($event)"
              (searchKeywordChange)="onSearchKeywordChange($event)">
            </app-search-box>
            <app-novel-filter></app-novel-filter>
          </div>

          @if (searchKeyword && searchKeyword.trim().length > 0) {
          <div class="search-results-overlay">
            <app-search-results [results]="searchResults" [maxResults]="10" [showTopResults]="true"
              (resultClick)="onSearchResultClick($event)">
            </app-search-results>
          </div>
          }
        </div>

        <div class="bottom-overlay">
          <app-timeline-container [timelineItems]="(timeline$ | async) || []" [events]="(events$ | async) || []"
            (timeRangeChange)="onTimeRangeChange($event)" (eventDotClick)="onEventDotClick($event)">
          </app-timeline-container>
        </div>
      </div>

      @if (loading$ | async) {
      <div class="loading-overlay">
        <div class="loader"></div>
        <p>載入金庸世界中...</p>
      </div>
      }

      @if (error$ | async; as error) {
      <div class="error-overlay">
        <p>{{ error }}</p>
        <button (click)="loadData()">重試</button>
      </div>
      }
    </div>

  </mat-sidenav-content>

  <!-- 右側抽屜：事件卡片 -->
  <mat-sidenav class="event-card-sidenav" position="end" [opened]="(selectedEvent$ | async) !== null" mode="over">
    <app-event-card [event]="selectedEvent$ | async" (close)="onCloseEventCard()"
      (navigateToEvent)="onNavigateToEvent($event)">
    </app-event-card>
  </mat-sidenav>
</mat-sidenav-container>
